name: CI - worker

on:
  push:
    branches: [main, staging, prod]
    paths:
      - 'worker/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::086241318869:role/github-actions-ci
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Lint
        run: |
          pip install flake8
          flake8 worker/ --max-line-length=120

      - name: Unit tests
        run: |
          pip install -r worker/requirements.txt pytest
          pytest worker/tests/ -v

      - name: Build and push image
        run: |
          IMAGE=086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-worker
          SHA=${{ github.sha }}
          docker build -t $IMAGE:$SHA ./worker
          docker push $IMAGE:$SHA

      - name: Update image tag in gitops repo
        run: |
          BRANCH=${{ github.ref_name }}
          if [ "$BRANCH" = "main" ]; then ENV="dev"
          elif [ "$BRANCH" = "staging" ]; then ENV="staging"
          else ENV="production"
          fi
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/ilaycohen12/snaPDF-gitops.git
          cd snaPDF-gitops
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" environments/$ENV/signed-worker/values.yaml
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" environments/$ENV/free-worker/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add environments/$ENV/signed-worker/values.yaml environments/$ENV/free-worker/values.yaml
          git commit -m "ci: update worker image tag to ${{ github.sha }} ($ENV)"
          git push
